apiVersion: networking.istio.io/v1alpha3
kind: EnvoyFilter
metadata:
  name: chat-oauth2-exchange
  namespace: default
  labels:
    app.kubernetes.io/managed-by: kustomize
    project: bootsandcats
spec:
  # IMPORTANT: update this selector to match the chat app's workload labels in the other repo
  workloadSelector:
    labels:
      app: chat-backend
  configPatches:
    - applyTo: CLUSTER
      match:
        context: ANY
      patch:
        operation: ADD
        value:
          name: oauth2_token_cluster_chat
          type: STRICT_DNS
          connect_timeout: 5s
          lb_policy: ROUND_ROBIN
          load_assignment:
            cluster_name: oauth2_token_cluster_chat
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: oauth2-server.default.svc.cluster.local
                          port_value: 80
    - applyTo: HTTP_FILTER
      match:
        context: SIDECAR_INBOUND
        listener:
          filterChain:
            filter:
              name: envoy.filters.network.http_connection_manager
              subFilter:
                name: envoy.filters.http.router
      patch:
        operation: INSERT_BEFORE
        value:
          name: envoy.filters.http.oauth2
          typed_config:
            '@type': type.googleapis.com/envoy.extensions.filters.http.oauth2.v3.OAuth2
            config:
              stat_prefix: chat_oauth
              authorization_endpoint: https://roauth2.cat-herding.net/oauth/authorize
              token_endpoint:
                cluster: oauth2_token_cluster_chat
                uri: http://oauth2-server.default.svc.cluster.local/oauth/token
                timeout: 5s
              # NOTE: This filter runs on SIDECAR_INBOUND. Depending on the ingress/gateway topology,
              # x-forwarded-proto may be absent or reflect the hop-to-pod scheme (often http).
              # Force https so the redirect_uri matches the externally-registered callback.
              redirect_uri: 'https://%REQ(:authority)%/_oauth2/callback'
              redirect_path_matcher:
                path:
                  # NOTE: Envoy matches against the full ":path" header which can include the query string.
                  # Use prefix matching so /_oauth2/callback?code=...&state=... is handled by the OAuth2 filter.
                  prefix: /_oauth2/callback
              signout_path:
                path:
                  prefix: /_oauth2/logout
              forward_bearer_token: true
              default_expires_in: 900s
              csrf_token_expires_in: 600s
              credentials:
                client_id: client_49e70f96-8fed-46b0-a57e-8a53e000f437
                token_secret:
                  name: chat-oauth-token
                  sds_config:
                    path: /etc/istio/oauth2/chat-oauth-token.yaml
                hmac_secret:
                  name: chat-oauth-hmac
                  sds_config:
                    path: /etc/istio/oauth2/chat-oauth-hmac.yaml
                cookie_names:
                  bearer_token: '_chat_session'
                  oauth_hmac: '_chat_oauth_hmac'
                  oauth_expires: '_chat_oauth_expires'
              cookie_configs:
                bearer_token_cookie_config:
                  same_site: LAX
                oauth_hmac_cookie_config:
                  same_site: LAX
                oauth_expires_cookie_config:
                  same_site: LAX
              auth_scopes:
                - openid
                - profile
                - email
              pass_through_matcher:
                - name: 'upgrade'
                  exact_match: 'websocket'
                - name: ':path'
                  prefix_match: '/actuator'
                - name: ':path'
                  exact_match: '/health'
                - name: ':path'
                  exact_match: '/healthz'
                - name: ':path'
                  exact_match: '/ready'
                - name: ':path'
                  prefix_match: '/api/status'
                - name: ':path'
                  prefix_match: '/public/'
                - name: ':path'
                  prefix_match: '/css/'
                - name: ':path'
                  prefix_match: '/js/'
                - name: ':path'
                  prefix_match: '/images/'
                - name: ':path'
                  prefix_match: '/webjars/'
                - name: ':path'
                  exact_match: '/favicon.ico'
                - name: ':path'
                  prefix_match: '/swagger'
                - name: ':path'
                  prefix_match: '/openapi'
                - name: ':path'
                  prefix_match: '/assets/'
                - name: ':path'
                  prefix_match: '/_expo'
                # Embed widget bundle + popup callback must be publicly
                # servable; they are the drop-in script a host page loads
                # *before* a user has any chat-session cookie, and the
                # callback receives the `?code=…&state=…` redirect from
                # roauth2 in a popup with no session yet.
                - name: ':path'
                  prefix_match: '/embed/'
                # PKCE token-exchange proxy the widget calls from the
                # browser during sign-in. The user has no session yet —
                # that is literally what this endpoint is for. Gating it
                # behind the Envoy OAuth2 filter would redirect the POST
                # to the auth server and break the flow.
                - name: ':path'
                  prefix_match: '/api/auth/embed/'
